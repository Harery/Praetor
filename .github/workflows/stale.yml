name: Stale Issues & PRs
on:
  schedule:
    - cron: "0 0 * * *"

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-stale: 60
          days-before-close: 14
          stale-issue-message: >
            This issue has been inactive for 60 days and is now
            marked as stale. It will be closed in 14 days if no
            further activity occurs.
          stale-pr-message: >
            This pull request has been inactive for 60 days and is
            now marked as stale. It will be closed in 14 days if no
            further activity occurs.
          stale-issue-label: stale
          stale-pr-label: stale
          close-issue-label: wontfix
          close-pr-label: wontfix
          exempt-issue-labels: pinned,security
          exempt-pr-labels: pinned,security
