<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Bold Gold for Comics -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe566"/>
      <stop offset="50%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>

    <!-- Divine Eye Glow — White-Gold Core -->
    <radialGradient id="divine-eye" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#fffacd"/>
      <stop offset="70%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#ff8c00" stop-opacity="0"/>
    </radialGradient>

    <!-- Outer halo for divine eyes -->
    <radialGradient id="eye-halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#ff8c00" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ff4500" stop-opacity="0"/>
    </radialGradient>

    <!-- Deep Background -->
    <radialGradient id="bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#030508"/>
    </radialGradient>

    <!-- Bold Ink Glow -->
    <filter id="ink-glow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Heavy Glow for Eyes -->
    <filter id="eye-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle shadow -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- ==================== BACKGROUND ==================== -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Subtle radial spotlight behind helmet -->
  <ellipse cx="256" cy="256" rx="180" ry="180" fill="#0f172a" opacity="0.5"/>

  <!-- ==================== HELMET — COMICS STYLE ==================== -->
  <g transform="translate(256, 256)" filter="url(#shadow)">

    <!-- ===== HELMET DOME — Bold comics outlines ===== -->
    <path d="
      M-75,-130
      C-78,-170 -55,-195 0,-200
      C55,-195 78,-170 75,-130
      C80,-75 70,-15 58,30
      C46,60 26,85 0,95
      C-26,85 -46,60 -58,30
      C-70,-15 -80,-75 -75,-130 Z
    " fill="#0b1120" stroke="url(#gold)" stroke-width="5" stroke-linejoin="round"/>

    <!-- Inner dome highlight (comics cel-shading) -->
    <path d="
      M-55,-125
      C-58,-155 -38,-175 0,-178
      C38,-175 58,-155 55,-125
      C58,-80 52,-35 44,10
      L-44,10
      C-52,-35 -58,-80 -55,-125 Z
    " fill="#111d35" stroke="none"/>

    <!-- ===== BROW PLATE — Bold golden crown ===== -->
    <path d="
      M-78,-108
      Q-42,-130 0,-132
      Q42,-130 78,-108
    " fill="none" stroke="url(#gold)" stroke-width="7" stroke-linecap="round" filter="url(#ink-glow)"/>

    <!-- Center diamond -->
    <path d="M0,-140 L8,-132 L0,-124 L-8,-132 Z" fill="url(#gold)" filter="url(#ink-glow)"/>

    <!-- ===== LAUREL WREATH — Bold comics leaves (Left) ===== -->
    <g fill="url(#gold)" stroke="#b8860b" stroke-width="1" filter="url(#ink-glow)">
      <path d="M-80,-95 C-102,-108 -112,-92 -100,-80 C-93,-86 -86,-90 -80,-95 Z"/>
      <path d="M-86,-64 C-110,-74 -116,-56 -103,-44 C-96,-51 -90,-58 -86,-64 Z"/>
      <path d="M-84,-34 C-108,-42 -112,-22 -98,-12 C-92,-19 -86,-27 -84,-34 Z"/>
      <path d="M-78,-6 C-98,-12 -104,8 -88,16 C-83,7 -79,0 -78,-6 Z"/>
      <path d="M-68,20 C-86,22 -92,40 -76,44 C-73,34 -70,26 -68,20 Z"/>
    </g>
    <!-- Right -->
    <g fill="url(#gold)" stroke="#b8860b" stroke-width="1" filter="url(#ink-glow)">
      <path d="M80,-95 C102,-108 112,-92 100,-80 C93,-86 86,-90 80,-95 Z"/>
      <path d="M86,-64 C110,-74 116,-56 103,-44 C96,-51 90,-58 86,-64 Z"/>
      <path d="M84,-34 C108,-42 112,-22 98,-12 C92,-19 86,-27 84,-34 Z"/>
      <path d="M78,-6 C98,-12 104,8 88,16 C83,7 79,0 78,-6 Z"/>
      <path d="M68,20 C86,22 92,40 76,44 C73,34 70,26 68,20 Z"/>
    </g>

    <!-- ===== NOSE GUARD — Bold ===== -->
    <path d="
      M-12,-108 L12,-108 L10,20 L0,42 L-10,20 Z
    " fill="#0d1528" stroke="url(#gold)" stroke-width="3.5"/>
    <line x1="0" y1="-108" x2="0" y2="42" stroke="url(#gold)" stroke-width="1.5"/>

    <!-- ===== CHEEK GUARDS — Bold ===== -->
    <path d="M-60,-65 L-75,38 L-42,72 L-34,14 Z" fill="#0a0f1e" stroke="url(#gold)" stroke-width="3.5"/>
    <path d="M60,-65 L75,38 L42,72 L34,14 Z" fill="#0a0f1e" stroke="url(#gold)" stroke-width="3.5"/>

    <!-- ===== CYBER WIRING — Bold neon lines ===== -->
    <path d="M-56,-32 L-42,10" stroke="#00f2fe" stroke-width="3" stroke-linecap="round" filter="url(#ink-glow)"/>
    <path d="M56,-32 L42,10" stroke="#00f2fe" stroke-width="3" stroke-linecap="round" filter="url(#ink-glow)"/>

    <!-- ===== DIVINE / GLORIOUS EYES ===== -->
    <!-- Left eye halo -->
    <circle cx="-38" cy="-76" r="22" fill="url(#eye-halo)" filter="url(#eye-glow)"/>
    <!-- Right eye halo -->
    <circle cx="38" cy="-76" r="22" fill="url(#eye-halo)" filter="url(#eye-glow)"/>

    <!-- Left eye core — radiant diamond shape -->
    <path d="M-52,-76 L-38,-90 L-24,-76 L-38,-62 Z" fill="url(#divine-eye)" filter="url(#eye-glow)"/>
    <!-- Right eye core -->
    <path d="M24,-76 L38,-90 L52,-76 L38,-62 Z" fill="url(#divine-eye)" filter="url(#eye-glow)"/>

    <!-- Inner white-hot core -->
    <circle cx="-38" cy="-76" r="6" fill="#ffffff" opacity="0.95" filter="url(#eye-glow)"/>
    <circle cx="38" cy="-76" r="6" fill="#ffffff" opacity="0.95" filter="url(#eye-glow)"/>

    <!-- Radiant rays from eyes (comics style) -->
    <g stroke="#ffd700" stroke-width="1.5" opacity="0.4" filter="url(#ink-glow)">
      <line x1="-55" y1="-76" x2="-68" y2="-80"/>
      <line x1="-55" y1="-76" x2="-66" y2="-68"/>
      <line x1="-21" y1="-76" x2="-10" y2="-80"/>
      <line x1="-21" y1="-76" x2="-10" y2="-68"/>
      <line x1="55" y1="-76" x2="68" y2="-80"/>
      <line x1="55" y1="-76" x2="66" y2="-68"/>
      <line x1="21" y1="-76" x2="10" y2="-80"/>
      <line x1="21" y1="-76" x2="10" y2="-68"/>
    </g>

    <!-- ===== CHIN GUARD ===== -->
    <path d="M-38,72 Q-18,100 0,106 Q18,100 38,72" fill="none" stroke="url(#gold)" stroke-width="3" opacity="0.7"/>

    <!-- ===== VERSION STAMP ===== -->
    <text x="0" y="145"
      font-family="'Fira Code', Monaco, Consolas, 'Courier New', monospace"
      font-weight="700" font-size="14"
      fill="#d4af37" letter-spacing="3"
      text-anchor="middle" opacity="0.6">
    </text>
  </g>

</svg>