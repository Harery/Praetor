<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe566"/>
      <stop offset="50%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <radialGradient id="de" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#ff8c00" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Dark bg -->
  <rect width="64" height="64" rx="14" fill="#0b1120"/>

  <g transform="translate(32, 30)">
    <!-- Dome -->
    <path d="M-13,-24 C-14,-30 -9,-35 0,-36 C9,-35 14,-30 13,-24 C14,-14 12,-4 10,4 C8,10 5,14 0,16 C-5,14 -8,10 -10,4 C-12,-4 -14,-14 -13,-24 Z"
      fill="#111d35" stroke="url(#g)" stroke-width="2"/>

    <!-- Brow -->
    <path d="M-14,-20 Q0,-26 14,-20" fill="none" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Nose -->
    <line x1="0" y1="-22" x2="0" y2="10" stroke="url(#g)" stroke-width="1.5"/>

    <!-- Cheeks -->
    <path d="M-11,-12 L-14,8 L-8,13 L-6,3 Z" fill="#0a0f1e" stroke="url(#g)" stroke-width="1.3"/>
    <path d="M11,-12 L14,8 L8,13 L6,3 Z" fill="#0a0f1e" stroke="url(#g)" stroke-width="1.3"/>

    <!-- Divine Eyes (glowing diamonds) -->
    <path d="M-12,-18 L-7,-24 L-2,-18 L-7,-12 Z" fill="url(#de)"/>
    <path d="M2,-18 L7,-24 L12,-18 L7,-12 Z" fill="url(#de)"/>
    <circle cx="-7" cy="-18" r="2" fill="#fff" opacity="0.9"/>
    <circle cx="7" cy="-18" r="2" fill="#fff" opacity="0.9"/>

    <!-- Laurel hints -->
    <path d="M-15,-20 C-18,-24 -20,-20 -18,-17" fill="url(#g)" opacity="0.7"/>
    <path d="M15,-20 C18,-24 20,-20 18,-17" fill="url(#g)" opacity="0.7"/>
    <path d="M-16,-12 C-19,-15 -21,-11 -19,-9" fill="url(#g)" opacity="0.5"/>
    <path d="M16,-12 C19,-15 21,-11 19,-9" fill="url(#g)" opacity="0.5"/>
  </g>
</svg>