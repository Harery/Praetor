    <text x="18" y="32" fill="#c7d4e2" font-family="'EB Garamond', serif" font-size="14">Release Gate</text>
    <text x="18" y="62" fill="#e6edf3" font-family="Cinzel, 'EB Garamond', serif" font-size="22" font-weight="600">READY</text>
    <rect x="18" y="78" width="140" height="6" rx="3" fill="#1f6feb"/>
    <text x="18" y="104" fill="#9bb0c4" font-family="'EB Garamond', serif" font-size="12">Artifacts verified</text>
