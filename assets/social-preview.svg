    <text x="24" y="26" fill="#0b0f14" font-family="Cinzel, 'EB Garamond', serif" font-size="16" font-weight="700" letter-spacing="1">v2.5</text>
  </g>

  <g transform="translate(820 358)" opacity="0.95">
