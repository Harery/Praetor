<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <!-- Chrome / Metallic Liquid Gold -->
    <linearGradient id="liquid-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff6d1"/>
      <stop offset="20%" stop-color="#d4af37"/>
      <stop offset="40%" stop-color="#aa7c11"/>
      <stop offset="45%" stop-color="#543d04"/>
      <stop offset="55%" stop-color="#aa7c11"/>
      <stop offset="80%" stop-color="#f3e5ab"/>
      <stop offset="100%" stop-color="#d4af37"/>
    </linearGradient>

    <!-- Cosmic Blue-Indigo Gradient -->
    <radialGradient id="space-bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0e131f"/>
      <stop offset="40%" stop-color="#080b11"/>
      <stop offset="100%" stop-color="#020305"/>
    </radialGradient>

    <!-- Neon Accents -->
    <linearGradient id="neon-cyan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00f2fe"/>
      <stop offset="100%" stop-color="#4facfe"/>
    </linearGradient>

    <linearGradient id="neon-magenta" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f857a6"/>
      <stop offset="100%" stop-color="#ff5858"/>
    </linearGradient>

    <linearGradient id="neon-emerald" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0575e6"/>
      <stop offset="100%" stop-color="#00f260"/>
    </linearGradient>

    <!-- Glassmorphism Card Gradient -->
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.01"/>
    </linearGradient>

    <!-- Volumetric Blur Filter -->
    <filter id="glow-heavy" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="35" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glow-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Deep Cosmic Canvas -->
  <rect width="1280" height="640" fill="url(#space-bg)"/>

  <!-- Starfield / Particle Nebula -->
  <g opacity="0.45">
    <circle cx="150" cy="120" r="1" fill="#fff"/>
    <circle cx="280" cy="450" r="1.5" fill="#00f2fe"/>
    <circle cx="560" cy="80" r="1" fill="#fff"/>
    <circle cx="720" cy="520" r="2" fill="#d4af37"/>
    <circle cx="1120" cy="180" r="1" fill="#fff"/>
    <circle cx="950" cy="90" r="1.5" fill="#f857a6"/>
    <circle cx="80" cy="380" r="1" fill="#fff"/>
  </g>

  <!-- Cyber Astrolabe / Celestial Coordinates -->
  <g transform="translate(640, 320)" opacity="0.08">
    <circle r="300" fill="none" stroke="#fff" stroke-width="1"/>
    <circle r="220" fill="none" stroke="url(#liquid-gold)" stroke-width="1.5" stroke-dasharray="8 6"/>
    <circle r="150" fill="none" stroke="#00f2fe" stroke-width="1" stroke-dasharray="15 30"/>
    <line x1="-340" y1="0" x2="340" y2="0" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="-340" x2="0" y2="340" stroke="#fff" stroke-width="0.5"/>
  </g>

  <!-- Glowing Aura Backdrops -->
  <circle cx="640" cy="280" r="280" fill="#0c1730" filter="url(#glow-heavy)" opacity="0.6"/>
  <circle cx="980" cy="320" r="180" fill="#3b0764" filter="url(#glow-heavy)" opacity="0.25"/>
  <circle cx="300" cy="320" r="220" fill="#002855" filter="url(#glow-heavy)" opacity="0.35"/>

  <!-- ================= THE MAIN GATEWAY (Roman Triumphal Arch + Cyber Portal) ================= -->
  <!-- A central glowing archway representing the "Main Release Gate" structure -->
  <g transform="translate(640, 290)" opacity="0.35">
    <!-- Left Column of the Gate -->
    <rect x="-180" y="-120" width="30" height="260" fill="none" stroke="url(#liquid-gold)" stroke-width="2" stroke-dasharray="10 5"/>
    <rect x="-190" y="140" width="50" height="20" fill="none" stroke="url(#liquid-gold)" stroke-width="3"/>
    
    <!-- Right Column of the Gate -->
    <rect x="150" y="-120" width="30" height="260" fill="none" stroke="url(#liquid-gold)" stroke-width="2" stroke-dasharray="10 5"/>
    <rect x="140" y="140" width="50" height="20" fill="none" stroke="url(#liquid-gold)" stroke-width="3"/>

    <!-- Triumphal Arch Architrave / Top Beam -->
    <rect x="-210" y="-150" width="420" height="30" fill="none" stroke="url(#liquid-gold)" stroke-width="3"/>
    <!-- Cybernetic Gate Ring inside the arch -->
    <path d="M-150,-120 A150,150 0 0,1 150,-120" fill="none" stroke="url(#neon-cyan)" stroke-width="2.5" stroke-dasharray="20 10"/>
    
    <!-- Gate Status Light Beams -->
    <line x1="-165" y1="-120" x2="-165" y2="140" stroke="url(#neon-cyan)" stroke-width="1" opacity="0.5"/>
    <line x1="165" y1="-120" x2="165" y2="140" stroke="url(#neon-cyan)" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- ================= BACKGROUND GEOMETRY & SWARM NETWORK ================= -->
  <!-- 18 Orbiting Agent Nodes in concentric arrays -->
  <g transform="translate(640, 290)" opacity="0.2">
    <!-- Outer Orbit Ring -->
    <path d="M 0,0 M -260,0 A 260,260 0 1,1 260,0 A 260,260 0 1,1 -260,0" fill="none" stroke="url(#liquid-gold)" stroke-width="1" stroke-dasharray="1 10"/>
    
    <!-- Outer Nodes & Vectors -->
    <g stroke="#00f2fe" stroke-width="0.5">
      <line x1="0" y1="0" x2="-183" y2="-183"/>
      <line x1="0" y1="0" x2="183" y2="-183"/>
      <line x1="0" y1="0" x2="-183" y2="183"/>
      <line x1="0" y1="0" x2="183" y2="183"/>
      <line x1="0" y1="0" x2="-260" y2="0"/>
      <line x1="0" y1="0" x2="260" y2="0"/>
    </g>

    <!-- Node dots -->
    <circle cx="-183" cy="-183" r="5" fill="#00f2fe"/>
    <circle cx="183" cy="-183" r="5" fill="#f857a6"/>
    <circle cx="-183" cy="183" r="5" fill="#d4af37"/>
    <circle cx="183" cy="183" r="5" fill="#00f260"/>
  </g>

  <!-- ================= THE HERO CENTERPIECE: CYBER-ROMAN PRAETOR HELMET ================= -->
  <g transform="translate(640, 275) scale(0.95)">
    <!-- Outer Shield Halo -->
    <path d="M-120,-140 C-120,-140 0,-180 120,-140 C140,-40 110,120 0,190 C-110,120 -140,-40 -120,-140 Z" fill="none" stroke="url(#liquid-gold)" stroke-width="1" opacity="0.3"/>
    
    <!-- Helmet Plume (Crest) - Translucent glowing neon-crimson curves -->
    <path d="M-80,-150 C-40,-260 40,-260 80,-150 C60,-190 -60,-190 -80,-150 Z" fill="url(#neon-magenta)" opacity="0.7" filter="url(#glow-soft)"/>
    <path d="M-50,-165 C-20,-240 20,-240 50,-165 C30,-195 -30,-195 -50,-165 Z" fill="url(#liquid-gold)" opacity="0.5"/>

    <!-- Helmet Crown/Dome -->
    <path d="M-70,-80 C-70,-150 70,-150 70,-80 C70,-50 50,-30 0,-30 C-50,-30 -70,-50 -70,-80 Z" fill="#05070a" stroke="url(#liquid-gold)" stroke-width="3" filter="url(#glow-soft)"/>

    <!-- Brow Plate (Golden Roman Crown line) -->
    <path d="M-75,-75 Q0,-95 75,-75 L80,-60 Q0,-80 -80,-60 Z" fill="url(#liquid-gold)"/>

    <!-- Laurel Leaves Wreath wrapping the sides -->
    <g fill="url(#liquid-gold)" opacity="0.9">
      <!-- Left wreath leaves -->
      <path d="M-80,-70 C-95,-80 -105,-70 -100,-60 C-90,-65 -85,-68 -80,-70 Z"/>
      <path d="M-85,-40 C-105,-48 -110,-35 -102,-25 C-95,-30 -90,-35 -85,-40 Z"/>
      <path d="M-80,-10 C-100,-15 -102,0 -92,8 C-87,0 -82,-5 -80,-10 Z"/>
      <!-- Right wreath leaves -->
      <path d="M80,-70 C95,-80 105,-70 100,-60 C90,-65 85,-68 80,-70 Z"/>
      <path d="M85,-40 C105,-48 110,-35 102,-25 C95,-30 90,-35 85,-40 Z"/>
      <path d="M80,-10 C100,-15 102,0 92,8 C87,0 82,-5 80,-10 Z"/>
    </g>

    <!-- Cheek Protectors (Cyber-styled with neon lines) -->
    <path d="M-60,-40 L-70,40 L-35,60 L-35,10 Z" fill="#090d16" stroke="url(#liquid-gold)" stroke-width="2"/>
    <path d="M60,-40 L70,40 L35,60 L35,10 Z" fill="#090d16" stroke="url(#liquid-gold)" stroke-width="2"/>
    
    <!-- Neon wiring on Cheek plates -->
    <path d="M-60,0 L-45,30" stroke="#00f2fe" stroke-width="2" stroke-linecap="round"/>
    <path d="M60,0 L45,30" stroke="#00f2fe" stroke-width="2" stroke-linecap="round"/>

    <!-- Nose Guard (Gladiator Style) -->
    <path d="M-15,-70 L15,-70 L10,15 L0,35 L-10,15 Z" fill="#0f172a" stroke="url(#liquid-gold)" stroke-width="2"/>
    <line x1="0" y1="-70" x2="0" y2="35" stroke="url(#liquid-gold)" stroke-width="1"/>

    <!-- Glowing Visor Eyes (Cyberpunk neon-cyan slit) -->
    <path d="M-50,-42 L-15,-48 L-15,-38 Z" fill="#00f2fe" filter="url(#glow-soft)"/>
    <path d="M50,-42 L15,-48 L15,-38 Z" fill="#00f2fe" filter="url(#glow-soft)"/>
  </g>

  <!-- ================= FOREGROUND USER INTERFACE / GLASS CARDS ================= -->

  <!-- Top Left: System Status Terminal -->
  <g transform="translate(50, 50)">
    <rect width="280" height="90" rx="10" fill="url(#glass)" stroke="rgba(255,255,255,0.08)" stroke-width="1" />
    <text x="15" y="25" font-family="Fira Code, Monaco, Consolas, Courier New, monospace" font-weight="500" letter-spacing="2" font-size="10" fill="#00f2fe">&gt;_ SYSTEM_ORCHESTRATOR</text>
    <text x="15" y="48" font-family="Plus Jakarta Sans, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-weight="700" font-size="16" fill="#ffffff">PHASE_5: COMPLETE</text>
    <text x="15" y="70" font-family="Fira Code, Monaco, Consolas, Courier New, monospace" font-weight="500" letter-spacing="2" font-size="10" fill="#8892b0">CITATIONS: 100% VERIFIED</text>
    <circle cx="255" cy="43" r="4" fill="#00f260" filter="url(#glow-soft)"/>
  </g>

  <!-- Top Right: Quality Council Verification Shield -->
  <g transform="translate(950, 50)">
    <rect width="280" height="90" rx="10" fill="url(#glass)" stroke="rgba(255,255,255,0.08)" stroke-width="1" />
    <text x="20" y="25" font-family="Fira Code, Monaco, Consolas, Courier New, monospace" font-weight="500" letter-spacing="2" font-size="10" fill="#d4af37">SECURE_LEDGER // V2.5</text>
    
    <!-- 4 Judges Indicator grid -->
    <g transform="translate(20, 38)">
      <!-- Judge 1 -->
      <rect x="0" y="0" width="40" height="6" rx="3" fill="url(#neon-cyan)"/>
      <text x="0" y="22" font-family="Fira Code, Monaco, Consolas, Courier New, monospace" font-weight="500" letter-spacing="2" font-size="9" fill="#8892b0">COV</text>
      <!-- Judge 2 -->
      <rect x="55" y="0" width="40" height="6" rx="3" fill="url(#neon-cyan)"/>
      <text x="55" y="22" font-family="Fira Code, Monaco, Consolas, Courier New, monospace" font-weight="500" letter-spacing="2" font-size="9" fill="#8892b0">CIT</text>
      <!-- Judge 3 -->
      <rect x="110" y="0" width="40" height="6" rx="3" fill="url(#neon-cyan)"/>
      <text x="110" y="22" font-family="Fira Code, Monaco, Consolas, Courier New, monospace" font-weight="500" letter-spacing="2" font-size="9" fill="#8892b0">CLR</text>
      <!-- Judge 4 -->
      <rect x="165" y="0" width="40" height="6" rx="3" fill="url(#neon-cyan)"/>
      <text x="165" y="22" font-family="Fira Code, Monaco, Consolas, Courier New, monospace" font-weight="500" letter-spacing="2" font-size="9" fill="#8892b0">VAL</text>
    </g>
    <g transform="translate(240, 45)">
      <circle r="18" fill="#05070a" stroke="url(#liquid-gold)" stroke-width="1.5"/>
      <path d="M-6,0 L-2,4 L6,-4" fill="none" stroke="#00f260" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- ================= THE MAIN RELEASE GATE STAT CARD (LEFT MIDDLE) ================= -->
  <!-- Visualizing the gate ready status prominently to entice customers -->
  <g transform="translate(50, 240)">
    <rect width="220" height="150" rx="12" fill="url(#glass)" stroke="rgba(0, 242, 254, 0.15)" stroke-width="1" filter="url(#glow-soft)"/>
    <text x="18" y="28" font-family="Fira Code, Monaco, Consolas, Courier New, monospace" font-size="10" font-weight="500" fill="#00f2fe" letter-spacing="1">MAIN_RELEASE_GATE</text>
    <text x="18" y="68" font-family="Plus Jakarta Sans, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="28" font-weight="800" fill="#00f260">ACTIVE // PASS</text>
    
    <g transform="translate(18, 85)">
      <rect width="184" height="6" rx="3" fill="#1e293b"/>
      <rect width="184" height="6" rx="3" fill="url(#neon-emerald)"/>
    </g>
    
    <text x="18" y="112" font-family="Plus Jakarta Sans, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#e2e8f0">Production Blockers: 0</text>
    <text x="18" y="130" font-family="Plus Jakarta Sans, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="11" font-weight="500" fill="#8892b0">Continuous CI Integration</text>
  </g>

  <!-- ================= CONTRIBUTOR & CUSTOMER ENGAGEMENT CARD (RIGHT MIDDLE) ================= -->
  <!-- Explicit attraction point for prospective users, clients, and open source developers -->
  <g transform="translate(1010, 240)">
    <rect width="220" height="150" rx="12" fill="url(#glass)" stroke="rgba(212, 175, 55, 0.15)" stroke-width="1" filter="url(#glow-soft)"/>
    <text x="18" y="28" font-family="Fira Code, Monaco, Consolas, Courier New, monospace" font-size="10" font-weight="500" fill="#d4af37" letter-spacing="1">JOIN_THE_SWARM</text>
    
    <!-- Open Source PRs Badge -->
    <g transform="translate(18, 42)">
      <rect width="184" height="26" rx="6" fill="#1b2518" stroke="#00f260" stroke-width="0.5"/>
      <text x="12" y="17" font-family="Plus Jakarta Sans, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#00f260">★ PRs &amp; ISSUES WELCOME</text>
    </g>

    <!-- Dev / Audit Value Spec -->
    <text x="18" y="94" font-family="Plus Jakarta Sans, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#ffffff">Enterprise Compliance</text>
    <text x="18" y="112" font-family="Plus Jakarta Sans, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="10" font-weight="500" fill="#8892b0">1 Prompt Audit Packaging</text>
    <text x="18" y="130" font-family="Plus Jakarta Sans, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="10" font-weight="500" fill="#8892b0">SOC2, GDPR &amp; ISO Ready</text>
  </g>

  <!-- ================= CENTRAL TITLES & BRANDING (BOTTOM THIRD) ================= -->
  <!-- Centered Branding with Classical Serif combined with Cyberpunk Monospace details -->
  <g transform="translate(640, 485)">
    <!-- Main Branding Title -->
    <text x="0" y="0" font-family="Cinzel Decorative, Cinzel, Georgia, Times New Roman, serif" font-weight="900" fill="url(#liquid-gold)" letter-spacing="12" filter="drop-shadow(0 0 15px rgba(212, 175, 55, 0.4))" font-size="64" text-anchor="middle">PRAETOR</text>
    
    <!-- Classical Roman Wreath Emblem underneath title -->
    <path d="M-150,15 C-120,30 -60,25 -20,15 M20,15 C60,25 120,30 150,15" fill="none" stroke="url(#liquid-gold)" stroke-width="2" opacity="0.6"/>
    
    <!-- Subtitle (Modern styling) -->
    <text x="0" y="36" font-family="Plus Jakarta Sans, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-weight="700" font-size="18" fill="#ffffff" letter-spacing="4" text-anchor="middle" text-transform="uppercase">
      Autonomous Production Readiness &amp; Auditing Swarm
    </text>
    
    <!-- Extra Detail Tagline (Minimalism) -->
    <text x="0" y="62" font-family="Fira Code, Monaco, Consolas, Courier New, monospace" font-weight="500" letter-spacing="2" font-size="11" fill="#64748b" text-anchor="middle">
      18 EXPERT AGENTS • 100% CITATION TRACEABILITY • ZERO HALLUCINATION ASSURANCE
    </text>
  </g>

  <!-- Decorative Corner Elements (Terminal Brackets) -->
  <g stroke="#ffffff" stroke-width="1" opacity="0.15">
    <!-- Top-Left -->
    <path d="M 20,40 L 20,20 L 40,20"/>
    <!-- Top-Right -->
    <path d="M 1260,40 L 1260,20 L 1240,20"/>
    <!-- Bottom-Left -->
    <path d="M 20,600 L 20,620 L 40,620"/>
    <!-- Bottom-Right -->
    <path d="M 1260,600 L 1260,620 L 1240,620"/>
  </g>

  <!-- Status Bar Footer -->
  <rect x="0" y="635" width="1280" height="5" fill="url(#neon-emerald)"/>
</svg>
