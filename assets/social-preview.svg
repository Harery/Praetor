  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>

  <g opacity="0.25">
    <path d="M80 500 C220 420, 360 420, 500 500" fill="none" stroke="#1f2e3a" stroke-width="2"/>
    <path d="M780 500 C920 420, 1060 420, 1200 500" fill="none" stroke="#1f2e3a" stroke-width="2"/>
  </g>

  <g opacity="0.2" stroke="#223444" stroke-width="1">
    <path d="M120 180 H1160"/>
    <path d="M120 220 H1160"/>
    <path d="M120 260 H1160"/>
  </g>

  <rect x="70" y="90" width="1140" height="460" rx="28" fill="url(#steel)" stroke="#243545" stroke-width="2"/>

  <g transform="translate(1040 150)" opacity="0.8">
    <path d="M20 0 C40 20, 48 60, 30 100" fill="none" stroke="url(#gold)" stroke-width="6" stroke-linecap="round"/>
    <path d="M0 10 C10 40, 22 68, 38 92" fill="none" stroke="#9e8450" stroke-width="3" stroke-linecap="round"/>
    <circle cx="28" cy="110" r="6" fill="#d5b27a"/>
  </g>

  <g transform="translate(120 148)">
    <rect x="0" y="0" width="64" height="64" rx="12" fill="#0e151d" stroke="#2a3a4a" stroke-width="2"/>
    <path d="M12 44 L32 18 L52 44" fill="none" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M14 48 H50" fill="none" stroke="#9ed7ff" stroke-width="2" stroke-linecap="round"/>
  </g>

  <text x="210" y="190" fill="#e6edf3" font-family="Cinzel, 'EB Garamond', serif" font-size="58" font-weight="700" letter-spacing="2">Praetor</text>
  <rect x="210" y="206" width="320" height="4" fill="url(#gold)"/>

  <text x="210" y="252" fill="#b7c6d4" font-family="'EB Garamond', serif" font-size="24">Production readiness, audit, evidence, testing, operations, review</text>

  <text x="210" y="320" fill="#e6edf3" font-family="Cinzel, 'EB Garamond', serif" font-size="30" font-weight="600">Security, compliance, and release readiness</text>
  <text x="210" y="366" fill="#a8bbcb" font-family="'EB Garamond', serif" font-size="22">One prompt. 18 expert agents. Full file-line traceability.</text>

  <g transform="translate(210 418)">
